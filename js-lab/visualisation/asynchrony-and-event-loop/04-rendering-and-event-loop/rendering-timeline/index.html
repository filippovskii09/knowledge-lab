<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Rendering and Event Loop</title>
  <link rel="stylesheet" href="../../../core/theme.css">

    <style>
      .op { color: #56b6c2; }
      .val-num { color: #d19a66; }
      .val-str { color: #98c379; }
      .panel-box { width: 100%; border: 1px solid #d7dfe8; border-radius: 8px; background: #f9fbfc; padding: 10px; box-sizing: border-box; }
      .panel-title { font-size: 13px; font-weight: bold; text-transform: uppercase; color: #2c3e50; margin-bottom: 8px; letter-spacing: 0.04em; }
      .panel-value, .console-box, .queue, .lane, .phase-list { font-family: Consolas, monospace; font-size: 14px; }
      .queue, .lane, .phase-list { display: flex; flex-direction: column; gap: 6px; }
      .queue-item, .lane-item, .phase-item { padding: 7px 8px; border-radius: 6px; background: #edf2f7; border: 1px solid #d8e1eb; color: #23313f; }
      .queue-item.active, .lane-item.active, .phase-item.active { background: #d7ecff; border-color: #3498db; color: #0b4f79; font-weight: bold; }
      .queue-empty { padding: 7px 8px; border-radius: 6px; background: #f1f5f8; border: 1px dashed #c1ccd6; color: #708090; }
      .console-box { min-height: 60px; display: flex; flex-direction: column; gap: 4px; }
      .console-line { padding: 4px 6px; background: #1f2933; color: #d9e2ec; border-radius: 4px; }
      .status-pill { display: inline-block; padding: 4px 8px; border-radius: 999px; font-weight: bold; }
      .ok { background: #d6f5e8; color: #146c43; }
      .warn { background: #fff3cd; color: #8a6d1f; }
      .bad { background: #ffe1e1; color: #8b1e1e; }
      .neutral { background: #e8eef5; color: #415a77; }
      .timeline { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; width: 100%; }
      .frame { padding: 8px; border-radius: 6px; border: 1px solid #d8e1eb; background: #edf2f7; text-align: center; font-family: Consolas, monospace; }
      .frame.active { background: #d7ecff; border-color: #3498db; font-weight: bold; }
    </style>

</head>
<body>
  <div class="js-lab-header">
    <h2>Rendering and Event Loop</h2>
    <p>Why the browser does not paint in the middle of your task</p>
  </div>

  <div class="js-lab-controls">
    <button id="btnPrev" class="js-lab-btn" disabled>◄ Назад</button>
    <div class="js-lab-step-info" id="stepInfo">Крок 1 / 1</div>
    <button id="btnNext" class="js-lab-btn">Далі ►</button>
  </div>

  <div class="js-lab-app">
    <div class="js-lab-top-row">
      <div class="js-lab-code">
<div class="js-lab-line" id="line1"><span class="js-lab-line-num">1</span><span class="var">spinner</span>.<span class="var">style</span>.<span class="var">display</span> <span class="op">=</span> <span class="str">"block"</span>;</div>
<div class="js-lab-line" id="line2"><span class="js-lab-line-num">2</span><span class="fn">heavyWork</span>();</div>
</div>
      <div class="js-lab-stack">
        <div class="js-lab-stack-title">Runtime State</div>
        <div class="js-lab-stack-container" style="width:100%;max-width:520px;gap:12px;flex-direction:column;">
<div class="panel-box"><div class="panel-title">DOM State</div><div id="domBox" class="panel-value"></div></div>
<div class="panel-box"><div class="panel-title">Current Task</div><div id="taskBox" class="panel-value"></div></div>
<div class="panel-box"><div class="panel-title">Microtasks</div><div id="microtaskBox" class="queue"></div></div>
<div class="panel-box"><div class="panel-title">Render Pipeline</div><div id="renderBox" class="panel-value"></div></div>
<div class="panel-box"><div class="panel-title">Frames</div><div class="timeline"><div id="frame1" class="frame">Frame 1</div><div id="frame2" class="frame">Frame 2</div><div id="frame3" class="frame">Frame 3</div><div id="frame4" class="frame">Frame 4</div></div></div>
<div class="panel-box"><div class="panel-title">Console</div><div id="logBox" class="console-box"></div></div>
</div>
      </div>
    </div>

    <div class="js-lab-analysis" id="analysis-log">
      <h3 id="analysis-title">Title</h3>
      <div id="analysis-body" class="log-wrapper fade-in">
        <div class="js-lab-log-item">
          <span class="js-lab-log-label">What:</span>
          <span class="js-lab-log-content" id="log-what"></span>
        </div>
        <div class="js-lab-log-item">
          <span class="js-lab-log-label">Why:</span>
          <span class="js-lab-log-content" id="log-why"></span>
        </div>
        <div class="js-lab-log-item">
          <span class="js-lab-log-label">Insight:</span>
          <span class="js-lab-log-content" id="log-insight" style="color: var(--log-accent); font-weight: bold;"></span>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { JSLabEngine } from '../../../core/engine.js';

    const $ = (id) => document.getElementById(id);
    function setText(id, value) { $(id).innerHTML = value; }
    function renderList(id, items, activeIndex = -1) {
      $(id).innerHTML = items.length
        ? items.map((item, index) => `<div class="queue-item ${index === activeIndex ? 'active' : ''}">${item}</div>`).join('')
        : '<div class="queue-empty">empty</div>';
    }
    function renderConsole(lines) {
      $('logBox').innerHTML = lines.length
        ? lines.map((line) => `<div class="console-line">${line}</div>`).join('')
        : '<div class="queue-empty">(no output yet)</div>';
    }
    
    function renderFrames(active) {
      ['frame1','frame2','frame3','frame4'].forEach((id, index) => {
        $(id).classList.toggle('active', index + 1 === active);
      });
    }
    function renderState(domState, taskState, microtasks, renderStateText, activeFrame, logs) {
      setText('domBox', domState);
      setText('taskBox', taskState);
      renderList('microtaskBox', microtasks);
      setText('renderBox', renderStateText);
      renderFrames(activeFrame);
      renderConsole(logs);
    }


    const config = {
      steps: [
        
{
  codeLine: 'line1',
  state: { stack: ['Task'], heap: ['DOM'] },
  narration: {
    title: 'DOM Mutation Happens Now',
    what: 'JS змінює DOM state: spinner стає visible у DOM model.',
    why: 'DOM mutation — це ще не paint; це лише новий стан, який browser має намалювати пізніше.',
    insight: 'Розрізняй “DOM updated” і “pixels painted”.'
  },
  action: () => renderState('<span class="status-pill ok">spinner: visible in DOM</span>', '<span class="status-pill neutral">task still running</span>', [], '<span class="status-pill warn">paint pending</span>', 1, [])
},
{
  codeLine: 'line2',
  state: { stack: ['Task: heavyWork'], heap: ['DOM'] },
  narration: {
    title: 'Heavy Work Blocks Main Thread',
    what: 'Синхронна важка робота займає current task.',
    why: 'Поки task не закінчився, browser не переходить до render pipeline.',
    insight: 'Spinner може бути “в DOM”, але все ще невидимим для користувача.'
  },
  action: () => renderState('<span class="status-pill ok">spinner: visible in DOM</span>', '<span class="status-pill bad">heavyWork running</span>', [], '<span class="status-pill bad">paint blocked by current task</span>', 2, [])
},
{
  codeLine: 'line2',
  state: { stack: ['Task: heavyWork'], heap: ['DOM'] },
  narration: {
    title: 'Frames Are Missed',
    what: 'Поки JS тримає thread, browser втрачає render chances.',
    why: 'Frame budget витрачається на JS, а не на layout/paint.',
    insight: 'Long tasks шкодять не тільки timers, а й input latency та animation smoothness.'
  },
  action: () => renderState('<span class="status-pill ok">spinner: visible in DOM</span>', '<span class="status-pill bad">still blocking</span>', [], '<span class="status-pill bad">no render opportunity yet</span>', 3, [])
},
{
  codeLine: 'line2',
  state: { stack: [], heap: ['DOM'] },
  narration: {
    title: 'Task Finally Ends',
    what: 'Main thread звільняється після heavyWork.',
    why: 'Тепер runtime може перевірити microtasks і дати browser шанс на render.',
    insight: 'Якщо б тут були ще нескінченні microtasks, paint усе одно не настав би.'
  },
  action: () => renderState('<span class="status-pill ok">spinner: visible in DOM</span>', '<span class="status-pill ok">task finished</span>', [], '<span class="status-pill warn">render can start now</span>', 4, [])
},
{
  codeLine: 'line1',
  state: { stack: [], heap: ['DOM'] },
  narration: {
    title: 'Paint Happens After Yield',
    what: 'Browser проходить layout/paint і лише тепер показує spinner користувачу.',
    why: 'Paint став можливий тільки після завершення blocking work.',
    insight: 'Щоб loader реально зʼявився вчасно, треба не просто змінити DOM, а дати runtime реальний yield boundary.'
  },
  action: () => renderState('<span class="status-pill ok">spinner: visible in DOM</span>', '<span class="status-pill neutral">idle</span>', [], '<span class="status-pill ok">layout → paint → visible pixels</span>', 4, ['spinner visible to user'])
}

      ]
    };

    const engine = new JSLabEngine(config);
    engine.init();
  </script>
</body>
</html>
