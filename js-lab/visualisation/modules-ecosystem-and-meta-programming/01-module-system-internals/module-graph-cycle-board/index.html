<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Module Graph Cycle Board</title>
  <link rel="stylesheet" href="../../../core/theme.css">
  <style>
    .board { display:grid; grid-template-columns:340px 1fr; gap:20px; flex:1; min-height:0; }
    .panel { background:#fff; border:2px solid var(--color-border); border-radius:8px; padding:16px; overflow:auto; }
    .section-title { margin:0 0 12px 0; color:var(--color-stack); font-size:15px; font-weight:700; text-transform:uppercase; }
    .control-row { margin-bottom:12px; }
    label { display:block; margin-bottom:6px; font-size:13px; font-weight:700; color:#486581; }
    select, button { width:100%; padding:9px 10px; border-radius:6px; border:1px solid #c8d3dd; background:#f8fafc; font-size:14px; }
    .toolbar { display:flex; gap:10px; }
    .toolbar button { border:none; background:var(--color-stack); color:#fff; font-weight:700; cursor:pointer; }
    .toolbar .alt { background:#6c7a89; }
    .code-preview { background:var(--code-bg); color:var(--code-text); border-radius:8px; padding:14px; font-family:Consolas, monospace; white-space:pre-wrap; }
    .pill-list { display:flex; flex-wrap:wrap; gap:8px; }
    .pill { display:inline-block; padding:6px 10px; border-radius:999px; font-family:Consolas, monospace; font-size:13px; font-weight:700; }
    .good { background:#d6f5e8; color:#146c43; }
    .warn { background:#fff3cd; color:#8a6d1f; }
    .bad { background:#ffe1e1; color:#8b1e1e; }
    .neutral { background:#e8eef5; color:#415a77; }
    .explain-list { margin:0; padding-left:20px; }
    @media (max-width:960px){ .board{ grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <div class="js-lab-header"><h2>Module Graph Cycle Board</h2><p>Подивись, як evaluation order і cycle shape ламають модульний graph</p></div>
  <div class="js-lab-app">
    <div class="board">
      <div class="panel">
        <h3 class="section-title">Scenario</h3>
        <div class="control-row"><label for="scenarioSelect">Graph Type</label><select id="scenarioSelect"><option value="safe">A -> B -> C</option><option value="cycle">A -> B -> C -> A</option><option value="deferred">Cycle with deferred read</option></select></div>
        <div class="toolbar"><button id="analyzeBtn">Analyze</button><button id="clearBtn" class="alt">Reset</button></div>
      </div>
      <div class="panel">
        <h3 class="section-title">Generated Graph</h3>
        <div id="codePreview" class="code-preview"></div>
        <div class="box"><h4 class="section-title" style="font-size:13px; margin-bottom:8px;">Verdict</h4><div id="verdictList" class="pill-list"></div></div>
        <div class="box"><h4 class="section-title" style="font-size:13px; margin-bottom:8px;">Why</h4><ol id="explainList" class="explain-list"></ol></div>
      </div>
    </div>
  </div>
  <script type="module">
    import { JSLabEngine } from '../../../core/engine.js'; void JSLabEngine;
    const codePreview = document.getElementById('codePreview');
    const verdictList = document.getElementById('verdictList');
    const explainList = document.getElementById('explainList');
    function pill(label, cls){ return `<span class="pill ${cls}">${label}</span>`; }
    function analyze(){
      const scenario = document.getElementById('scenarioSelect').value;
      const verdicts=[]; const notes=[]; let code='';
      if (scenario === 'safe') {
        code = `A imports B
B imports C
C exports value

Evaluation: C -> B -> A`;
        verdicts.push(pill('acyclic graph', 'good'));
        notes.push('Без циклу runtime може побудувати стабільний evaluation order.');
      } else if (scenario === 'cycle') {
        code = `A imports B
B imports C
C imports A

Evaluation now depends on binding timing`;
        verdicts.push(pill('cycle detected', 'bad'));
        verdicts.push(pill('binding timing risk', 'warn'));
        notes.push('Одна зі сторін може прочитати export до завершення ініціалізації.');
      } else {
        code = `A imports B
B imports C
C imports A

But read happens inside function after startup`;
        verdicts.push(pill('cycle exists', 'warn'));
        verdicts.push(pill('deferred access may survive', 'neutral'));
        notes.push('Cycle сам по собі ще не гарантує падіння; критичний момент — коли саме читається binding.');
      }
      notes.push('Думай module graph + evaluation order, а не просто import syntax.');
      codePreview.textContent = code;
      verdictList.innerHTML = verdicts.join('');
      explainList.innerHTML = notes.map(x => `<li>${x}</li>`).join('');
    }
    document.getElementById('analyzeBtn').addEventListener('click', analyze);
    document.getElementById('clearBtn').addEventListener('click', () => { document.getElementById('scenarioSelect').value='safe'; analyze(); });
    analyze();
  </script>
</body>
</html>
