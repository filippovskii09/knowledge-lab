<!DOCTYPE html>
<html lang="uk"><head><meta charset="UTF-8"><title>Intl Formatting Board</title><link rel="stylesheet" href="../../../core/theme.css"><style>.board{display:grid;grid-template-columns:340px 1fr;gap:20px;flex:1;min-height:0}.panel{background:#fff;border:2px solid var(--color-border);border-radius:8px;padding:16px;overflow:auto}.section-title{margin:0 0 12px 0;color:var(--color-stack);font-size:15px;font-weight:700;text-transform:uppercase}.control-row{margin-bottom:12px}label{display:block;margin-bottom:6px;font-size:13px;font-weight:700;color:#486581}select,button{width:100%;padding:9px 10px;border-radius:6px;border:1px solid #c8d3dd;background:#f8fafc;font-size:14px}.toolbar{display:flex;gap:10px}.toolbar button{border:none;background:var(--color-stack);color:#fff;font-weight:700;cursor:pointer}.toolbar .alt{background:#6c7a89}.code-preview{background:var(--code-bg);color:var(--code-text);border-radius:8px;padding:14px;font-family:Consolas, monospace;white-space:pre-wrap}.pill-list{display:flex;flex-wrap:wrap;gap:8px}.pill{display:inline-block;padding:6px 10px;border-radius:999px;background:#e8eef5;color:#415a77;font-family:Consolas, monospace;font-size:13px;font-weight:700}.explain-list{margin:0;padding-left:20px}@media (max-width:960px){.board{grid-template-columns:1fr}}</style></head><body><div class="js-lab-header"><h2>Intl Formatting Board</h2><p>Порівняй locale-aware formatting для чисел і валют</p></div><div class="js-lab-app"><div class="board"><div class="panel"><h3 class="section-title">Formatter</h3><div class="control-row"><label for="localeSelect">Locale</label><select id="localeSelect"><option value="uk-UA">uk-UA</option><option value="en-US">en-US</option><option value="de-DE">de-DE</option></select></div><div class="control-row"><label for="typeSelect">Type</label><select id="typeSelect"><option value="currency">Currency</option><option value="number">Number</option></select></div><div class="toolbar"><button id="analyzeBtn">Analyze</button><button id="clearBtn" class="alt">Reset</button></div></div><div class="panel"><h3 class="section-title">Output</h3><div id="trace" class="code-preview"></div><div id="pills" class="pill-list"></div><ol id="explain" class="explain-list"></ol></div></div></div><script type="module">import { JSLabEngine } from '../../../core/engine.js'; void JSLabEngine; const value=12345.67; const trace=document.getElementById('trace'); const pills=document.getElementById('pills'); const explain=document.getElementById('explain'); function analyze(){ const locale=document.getElementById('localeSelect').value; const type=document.getElementById('typeSelect').value; let formatter; if(type==='currency'){ formatter=new Intl.NumberFormat(locale,{style:'currency',currency:'EUR'}); } else { formatter=new Intl.NumberFormat(locale); } trace.textContent=`locale = ${locale}
value = ${value}
formatted = ${formatter.format(value)}`; pills.innerHTML=[locale,type].map(x=>`<span class="pill">${x}</span>`).join(''); explain.innerHTML=['Той самий raw number отримує різний localized output.','Formatter object краще reuse-ити, ніж створювати хаотично щоразу.','Якщо форматування продукт-критичне, locale й options мають бути explicit.'].map(x=>`<li>${x}</li>`).join(''); } document.getElementById('analyzeBtn').addEventListener('click', analyze); document.getElementById('clearBtn').addEventListener('click', ()=>{document.getElementById('localeSelect').value='uk-UA'; document.getElementById('typeSelect').value='currency'; analyze();}); analyze();</script></body></html>
