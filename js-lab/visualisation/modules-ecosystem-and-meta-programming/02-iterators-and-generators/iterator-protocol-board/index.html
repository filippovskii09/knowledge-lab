<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8"><title>Iterator Protocol Board</title><link rel="stylesheet" href="../../../core/theme.css">
  <style>
    .board{display:grid;grid-template-columns:340px 1fr;gap:20px;flex:1;min-height:0}.panel{background:#fff;border:2px solid var(--color-border);border-radius:8px;padding:16px;overflow:auto}.section-title{margin:0 0 12px 0;color:var(--color-stack);font-size:15px;font-weight:700;text-transform:uppercase}.control-row{margin-bottom:12px}label{display:block;margin-bottom:6px;font-size:13px;font-weight:700;color:#486581}select,button{width:100%;padding:9px 10px;border-radius:6px;border:1px solid #c8d3dd;background:#f8fafc;font-size:14px}.toolbar{display:flex;gap:10px}.toolbar button{border:none;background:var(--color-stack);color:#fff;font-weight:700;cursor:pointer}.toolbar .alt{background:#6c7a89}.code-preview{background:var(--code-bg);color:var(--code-text);border-radius:8px;padding:14px;font-family:Consolas, monospace;white-space:pre-wrap}.pill-list{display:flex;flex-wrap:wrap;gap:8px}.pill{display:inline-block;padding:6px 10px;border-radius:999px;font-family:Consolas, monospace;font-size:13px;font-weight:700;background:#e8eef5;color:#415a77}.explain-list{margin:0;padding-left:20px}@media (max-width:960px){.board{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="js-lab-header"><h2>Iterator Protocol Board</h2><p>Подивись, як `for...of` багаторазово викликає `next()`</p></div>
<div class="js-lab-app"><div class="board"><div class="panel"><h3 class="section-title">Scenario</h3><div class="control-row"><label for="modeSelect">Iterator Type</label><select id="modeSelect"><option value="finite">Finite iterator</option><option value="broken-done">Broken done signal</option><option value="infinite">Never-ending iterator</option></select></div><div class="toolbar"><button id="analyzeBtn">Analyze</button><button id="clearBtn" class="alt">Reset</button></div></div><div class="panel"><h3 class="section-title">Protocol Trace</h3><div id="codePreview" class="code-preview"></div><div class="box"><h4 class="section-title" style="font-size:13px; margin-bottom:8px;">next() sequence</h4><div id="verdictList" class="pill-list"></div></div><div class="box"><h4 class="section-title" style="font-size:13px; margin-bottom:8px;">Why</h4><ol id="explainList" class="explain-list"></ol></div></div></div></div>
<script type="module">import { JSLabEngine } from '../../../core/engine.js'; void JSLabEngine; const code=document.getElementById('codePreview'); const verdict=document.getElementById('verdictList'); const explain=document.getElementById('explainList'); function analyze(){ const m=document.getElementById('modeSelect').value; let trace=''; let pills=[]; let notes=[]; if(m==='finite'){ trace=`next() -> { value: 1, done: false }
next() -> { value: 2, done: false }
next() -> { value: undefined, done: true }`; pills=['1','2','done:true']; notes.push('Protocol завершується чесно через `done: true`.'); } else if(m==='broken-done'){ trace=`next() -> { value: 1, done: false }
next() -> { value: undefined, done: false }`; pills=['1','broken done']; notes.push('Consumer не отримує правильного сигналу завершення.'); } else { trace=`next() -> { value: 1, done: false }
next() -> { value: 1, done: false }
next() -> { value: 1, done: false }`; pills=['1','1','1','...']; notes.push('Iterator ніколи не каже stop, тому `for...of` не завершиться сам.'); } notes.push('Правильність iterator protocol — це не синтаксис, а contract між producer і consumer.'); code.textContent=trace; verdict.innerHTML=pills.map(p=>`<span class="pill">${p}</span>`).join(''); explain.innerHTML=notes.map(n=>`<li>${n}</li>`).join(''); } document.getElementById('analyzeBtn').addEventListener('click', analyze); document.getElementById('clearBtn').addEventListener('click', ()=>{document.getElementById('modeSelect').value='finite'; analyze();}); analyze();</script>
</body>
</html>
