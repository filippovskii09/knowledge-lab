<!DOCTYPE html>
<html lang="uk"><head><meta charset="UTF-8"><title>Generator Yield Board</title><link rel="stylesheet" href="../../../core/theme.css"><style>.board{display:grid;grid-template-columns:340px 1fr;gap:20px;flex:1;min-height:0}.panel{background:#fff;border:2px solid var(--color-border);border-radius:8px;padding:16px;overflow:auto}.section-title{margin:0 0 12px 0;color:var(--color-stack);font-size:15px;font-weight:700;text-transform:uppercase}.code-preview{background:var(--code-bg);color:var(--code-text);border-radius:8px;padding:14px;font-family:Consolas, monospace;white-space:pre-wrap}.pill-list{display:flex;flex-wrap:wrap;gap:8px}.pill{display:inline-block;padding:6px 10px;border-radius:999px;background:#e8eef5;color:#415a77;font-family:Consolas, monospace;font-size:13px;font-weight:700}.explain-list{margin:0;padding-left:20px}@media (max-width:960px){.board{grid-template-columns:1fr}}</style></head><body><div class="js-lab-header"><h2>Generator Yield Board</h2><p>Подивись, як generator pause/resume-ить execution між `next()` викликами</p></div><div class="js-lab-app"><div class="board"><div class="panel"><h3 class="section-title">Case</h3><div class="code-preview">function* ids() {
  yield 10;
  yield 20;
  return 30;
}</div></div><div class="panel"><h3 class="section-title">Yield Trace</h3><div id="trace" class="code-preview"></div><div id="pills" class="pill-list"></div><ol id="explain" class="explain-list"></ol></div></div></div><script type="module">import { JSLabEngine } from '../../../core/engine.js'; void JSLabEngine; document.getElementById('trace').textContent=`next() -> { value: 10, done: false }
next() -> { value: 20, done: false }
next() -> { value: 30, done: true }`; document.getElementById('pills').innerHTML=['yield 10','yield 20','return 30'].map(p=>`<span class="pill">${p}</span>`).join(''); document.getElementById('explain').innerHTML=['Generator зберігає execution state між `next()` викликами.','`yield` віддає значення й pause-ить function body.','`return` завершує generator із `done: true`.'].map(x=>`<li>${x}</li>`).join('');</script></body></html>
