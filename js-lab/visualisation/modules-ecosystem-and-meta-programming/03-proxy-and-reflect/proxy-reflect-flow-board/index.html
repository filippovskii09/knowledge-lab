<!DOCTYPE html>
<html lang="uk"><head><meta charset="UTF-8"><title>Proxy Reflect Flow Board</title><link rel="stylesheet" href="../../../core/theme.css"><style>.board{display:grid;grid-template-columns:340px 1fr;gap:20px;flex:1;min-height:0}.panel{background:#fff;border:2px solid var(--color-border);border-radius:8px;padding:16px;overflow:auto}.section-title{margin:0 0 12px 0;color:var(--color-stack);font-size:15px;font-weight:700;text-transform:uppercase}.control-row{margin-bottom:12px}label{display:block;margin-bottom:6px;font-size:13px;font-weight:700;color:#486581}select,button{width:100%;padding:9px 10px;border-radius:6px;border:1px solid #c8d3dd;background:#f8fafc;font-size:14px}.toolbar{display:flex;gap:10px}.toolbar button{border:none;background:var(--color-stack);color:#fff;font-weight:700;cursor:pointer}.toolbar .alt{background:#6c7a89}.code-preview{background:var(--code-bg);color:var(--code-text);border-radius:8px;padding:14px;font-family:Consolas, monospace;white-space:pre-wrap}.pill-list{display:flex;flex-wrap:wrap;gap:8px}.pill{display:inline-block;padding:6px 10px;border-radius:999px;font-family:Consolas, monospace;font-size:13px;font-weight:700}.good{background:#d6f5e8;color:#146c43}.warn{background:#fff3cd;color:#8a6d1f}.bad{background:#ffe1e1;color:#8b1e1e}.explain-list{margin:0;padding-left:20px}@media (max-width:960px){.board{grid-template-columns:1fr}}</style></head><body><div class="js-lab-header"><h2>Proxy Reflect Flow Board</h2><p>Подивись, як operation проходить через trap і чому `Reflect` зазвичай безпечніший</p></div><div class="js-lab-app"><div class="board"><div class="panel"><h3 class="section-title">Scenario</h3><div class="control-row"><label for="modeSelect">Trap Strategy</label><select id="modeSelect"><option value="reflect">Trap + Reflect</option><option value="manual">Trap + manual access</option><option value="recursive">Recursive bug</option></select></div><div class="toolbar"><button id="analyzeBtn">Analyze</button><button id="clearBtn" class="alt">Reset</button></div></div><div class="panel"><h3 class="section-title">Flow</h3><div id="trace" class="code-preview"></div><div id="verdict" class="pill-list"></div><ol id="explain" class="explain-list"></ol></div></div></div><script type="module">import { JSLabEngine } from '../../../core/engine.js'; void JSLabEngine; const trace=document.getElementById('trace'); const verdict=document.getElementById('verdict'); const explain=document.getElementById('explain'); function pill(label, cls){return `<span class="pill ${cls}">${label}</span>`;} function analyze(){ const m=document.getElementById('modeSelect').value; let notes=[]; let pills=[]; if(m==='reflect'){ trace.textContent='caller -> proxy.get -> custom logic -> Reflect.get -> target'; pills=[pill('default semantics preserved','good')]; notes.push('Reflect дозволяє делегувати стандартну поведінку без ручної симуляції.'); } else if(m==='manual'){ trace.textContent='caller -> proxy.get -> custom logic -> target[key]'; pills=[pill('works sometimes','warn')]; notes.push('Manual access може втратити частину default semantics і стати джерелом subtle bugs.'); } else { trace.textContent='caller -> proxy.get -> proxy[key] -> same trap again'; pills=[pill('infinite recursion risk','bad')]; notes.push('Trap читає через proxy, тому знову викликає сам себе.'); } notes.push('Думай про proxy як про boundary, а не як про сам target.'); verdict.innerHTML=pills.join(''); explain.innerHTML=notes.map(n=>`<li>${n}</li>`).join(''); } document.getElementById('analyzeBtn').addEventListener('click', analyze); document.getElementById('clearBtn').addEventListener('click', ()=>{document.getElementById('modeSelect').value='reflect'; analyze();}); analyze();</script></body></html>
