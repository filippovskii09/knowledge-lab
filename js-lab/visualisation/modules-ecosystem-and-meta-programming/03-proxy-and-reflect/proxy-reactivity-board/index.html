<!DOCTYPE html>
<html lang="uk"><head><meta charset="UTF-8"><title>Proxy Reactivity Board</title><link rel="stylesheet" href="../../../core/theme.css"><style>.board{display:grid;grid-template-columns:340px 1fr;gap:20px;flex:1;min-height:0}.panel{background:#fff;border:2px solid var(--color-border);border-radius:8px;padding:16px;overflow:auto}.section-title{margin:0 0 12px 0;color:var(--color-stack);font-size:15px;font-weight:700;text-transform:uppercase}.code-preview{background:var(--code-bg);color:var(--code-text);border-radius:8px;padding:14px;font-family:Consolas, monospace;white-space:pre-wrap}.pill-list{display:flex;flex-wrap:wrap;gap:8px}.pill{display:inline-block;padding:6px 10px;border-radius:999px;background:#e8eef5;color:#415a77;font-family:Consolas, monospace;font-size:13px;font-weight:700}.explain-list{margin:0;padding-left:20px}@media (max-width:960px){.board{grid-template-columns:1fr}}</style></head><body><div class="js-lab-header"><h2>Proxy Reactivity Board</h2><p>Ментальна схема: interception + dependency tracking + trigger</p></div><div class="js-lab-app"><div class="board"><div class="panel"><h3 class="section-title">Reactive Sketch</h3><div class="code-preview">get -> track(key)
