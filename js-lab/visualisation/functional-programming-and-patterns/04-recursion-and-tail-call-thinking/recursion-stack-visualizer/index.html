<!DOCTYPE html>
<html lang="uk">
<head><meta charset="UTF-8"><title>Recursion Stack Visualizer</title><link rel="stylesheet" href="../../../core/theme.css"><style>.frame{border:2px solid #3498db;padding:12px;background:#ebf5fb;border-radius:8px}.frame-title{font-weight:bold;color:#2980b9;margin-bottom:6px}.panel-box{width:100%;border:1px solid #d7dfe8;border-radius:8px;background:#f9fbfc;padding:12px;box-sizing:border-box}.panel-title{font-size:13px;font-weight:bold;text-transform:uppercase;color:#2c3e50;margin-bottom:8px}</style></head>
<body><div class="js-lab-header"><h2>Recursion Stack Visualizer</h2><p>Подивись, як recursive calls ростять call stack до base case</p></div><div class="js-lab-controls"><button id="btnPrev" class="js-lab-btn" disabled>◄ Назад</button><div id="stepInfo" class="js-lab-step-info">Крок 1 / 1</div><button id="btnNext" class="js-lab-btn">Далі ►</button></div><div class="js-lab-app"><div class="js-lab-top-row"><div class="js-lab-code"><div class="js-lab-line" id="line1"><span class="js-lab-line-num">1</span><span class="kw">function</span> <span class="fn">sum</span>(list, index <span class="op">=</span> <span class="val-num">0</span>) {</div><div class="js-lab-line" id="line2"><span class="js-lab-line-num">2</span>  <span class="kw">if</span> (index <span class="op">&gt;=</span> list.length) <span class="kw">return</span> <span class="val-num">0</span>;</div><div class="js-lab-line" id="line3"><span class="js-lab-line-num">3</span>  <span class="kw">return</span> list[index] <span class="op">+</span> <span class="fn">sum</span>(list, index <span class="op">+</span> <span class="val-num">1</span>);</div><div class="js-lab-line" id="line4"><span class="js-lab-line-num">4</span>}</div></div><div class="js-lab-stack"><div class="js-lab-stack-title">Call Stack</div><div id="stackBox" class="js-lab-stack-container" style="width:100%;max-width:520px;"></div></div></div><div class="js-lab-analysis" id="analysis-log"><h3 id="analysis-title">Title</h3><div id="analysis-body" class="log-wrapper fade-in"><div class="js-lab-log-item"><span class="js-lab-log-label">What:</span><span id="log-what"></span></div><div class="js-lab-log-item"><span class="js-lab-log-label">Why:</span><span id="log-why"></span></div><div class="js-lab-log-item"><span class="js-lab-log-label">Insight:</span><span id="log-insight" style="color: var(--log-accent); font-weight: bold;"></span></div></div></div></div><script type="module">import { JSLabEngine } from '../../../core/engine.js'; const show = (frames) => { document.getElementById('stackBox').innerHTML = frames.map(f => `<div class="frame"><div class="frame-title">${f}</div></div>`).join(''); }; const config = { steps:[
{ codeLine:'line3', narration:{ title:'First Recursive Call', what:'sum([1,2,3], 0) викликає sum([1,2,3], 1).', why:'Recursive case зводить задачу до меншої версії себе.', insight:'Кожен такий call зазвичай створює новий stack frame.'}, action:()=>show(['sum(index=0)']) },
{ codeLine:'line3', narration:{ title:'Stack Growth', what:'Другий виклик додає ще один frame.', why:'Поки base case не досягнутий, chain росте.', insight:'Саме тому recursion має depth risk.'}, action:()=>show(['sum(index=1)','sum(index=0)']) },
{ codeLine:'line2', narration:{ title:'Base Case Reached', what:'На останньому кроці функція повертає 0 без нового recurse.', why:'Base case зупиняє подальший ріст стеку.', insight:'Без base case recursion не завершується.'}, action:()=>show(['sum(index=3)','sum(index=2)','sum(index=1)','sum(index=0)']) },
{ codeLine:'line3', narration:{ title:'Unwinding', what:'Stack починає згортатися назад із return values.', why:'Кожен попередній frame дочікується результату нижчого виклику.', insight:'Recursive elegance оплачується stack depth і deferred returns.'}, action:()=>show(['return 3','return 5','return 6']) }
]}; new JSLabEngine(config).init();</script></body></html>
