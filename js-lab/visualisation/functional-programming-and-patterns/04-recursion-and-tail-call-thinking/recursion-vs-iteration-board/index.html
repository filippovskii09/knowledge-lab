<!DOCTYPE html>
<html lang="uk">
<head><meta charset="UTF-8"><title>Recursion vs Iteration Board</title><link rel="stylesheet" href="../../../core/theme.css"><style>.panel-box{width:100%;border:1px solid #d7dfe8;border-radius:8px;background:#f9fbfc;padding:12px;box-sizing:border-box}.panel-title{font-size:13px;font-weight:bold;text-transform:uppercase;color:#2c3e50;margin-bottom:8px}.compare{display:grid;grid-template-columns:1fr 1fr;gap:12px}.card{border:1px solid #d7dfe8;border-radius:8px;background:#fff;padding:10px}.good{color:#146c43;font-weight:700}.warn{color:#8a5a00;font-weight:700}</style></head>
<body><div class="js-lab-header"><h2>Recursion vs Iteration Board</h2><p>Порівняй виразність моделі й runtime-ризики</p></div><div class="js-lab-controls"><button id="btnPrev" class="js-lab-btn" disabled>◄ Назад</button><div id="stepInfo" class="js-lab-step-info">Крок 1 / 1</div><button id="btnNext" class="js-lab-btn">Далі ►</button></div><div class="js-lab-app"><div class="js-lab-top-row"><div class="js-lab-code"><div class="js-lab-line" id="line1"><span class="js-lab-line-num">1</span><span class="kw">function</span> <span class="fn">walkRecursive</span>(node) { <span class="com">/* recurse children */</span> }</div><div class="js-lab-line" id="line2"><span class="js-lab-line-num">2</span><span class="kw">function</span> <span class="fn">walkIterative</span>(root) { <span class="com">/* explicit stack */</span> }</div></div><div class="js-lab-stack"><div class="js-lab-stack-title">Trade-off</div><div class="js-lab-stack-container" style="width:100%;max-width:520px;gap:12px;flex-direction:column;"><div class="panel-box"><div class="panel-title">Comparison</div><div id="compareBox" class="compare"></div></div></div></div></div><div class="js-lab-analysis" id="analysis-log"><h3 id="analysis-title">Title</h3><div id="analysis-body" class="log-wrapper fade-in"><div class="js-lab-log-item"><span class="js-lab-log-label">What:</span><span id="log-what"></span></div><div class="js-lab-log-item"><span class="js-lab-log-label">Why:</span><span id="log-why"></span></div><div class="js-lab-log-item"><span class="js-lab-log-label">Insight:</span><span id="log-insight" style="color: var(--log-accent); font-weight: bold;"></span></div></div></div></div><script type="module">import { JSLabEngine } from '../../../core/engine.js'; const show=(l1,l2,r1,r2)=>{document.getElementById('compareBox').innerHTML=`<div class="card"><div class="panel-title">Recursion</div><div class="good">${l1}</div><div class="warn">${l2}</div></div><div class="card"><div class="panel-title">Iteration</div><div class="good">${r1}</div><div class="warn">${r2}</div></div>`}; const config={steps:[
{ codeLine:'line1', narration:{ title:'Modeling Recursive Data', what:'Рекурсія природно збігається зі структурою дерева.', why:'Кожен node вирішується через обхід children як меншої версії тієї ж задачі.', insight:'Коли shape data рекурсивний, recursion часто читається ближче до доменної моделі.'}, action:()=>show('Natural for trees','Stack depth risk','More boilerplate','Safer for huge depth') },
{ codeLine:'line2', narration:{ title:'Runtime Safety', what:'Iteration через explicit stack прибирає залежність від call stack depth.', why:'Контроль переноситься з function calls у data structure.', insight:'У JS runtime iteration often wins for very deep or untrusted input.'}, action:()=>show('Readable for moderate depth','Not safe to assume TCO','Explicit control','Usually safer in production') }
]}; new JSLabEngine(config).init();</script></body></html>
