<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Recursion Debug Board</title>
  <link rel="stylesheet" href="../../../core/theme.css">
  <style>
    .board { display: grid; grid-template-columns: 340px 1fr; gap: 20px; flex: 1; min-height: 0; }
    .panel { background: #fff; border: 2px solid var(--color-border); border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.08); padding: 16px; overflow: auto; }
    .section-title { margin: 0 0 12px 0; color: var(--color-stack); font-size: 15px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
    .control-row { margin-bottom: 12px; }
    label { display: block; font-size: 13px; font-weight: 700; color: #486581; margin-bottom: 6px; }
    select, button, input { width: 100%; padding: 9px 10px; border-radius: 6px; border: 1px solid #c8d3dd; background: #f8fafc; font-size: 14px; box-sizing: border-box; }
    .toolbar { display: flex; gap: 10px; margin-top: 12px; }
    .toolbar button { border: none; background: var(--color-stack); color: #fff; font-weight: 700; cursor: pointer; }
    .toolbar button.alt { background: #6c7a89; }
    .preset-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .preset-btn { width: auto; padding: 6px 10px; border-radius: 999px; cursor: pointer; }
    .box { border: 1px solid #d9e2ec; border-radius: 8px; background: #f8fafc; padding: 12px; margin-bottom: 14px; }
    .code-preview { background: var(--code-bg); color: var(--code-text); border-radius: 8px; padding: 14px; font-family: Consolas, monospace; font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
    .pill-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .pill { display: inline-block; padding: 6px 10px; border-radius: 999px; font-family: Consolas, monospace; font-size: 13px; font-weight: 700; border: 1px solid transparent; }
    .good-pill { background: #d6f5e8; color: #146c43; border-color: #97dbbb; }
    .warn-pill { background: #fff3cd; color: #8a6d1f; border-color: #f1cf80; }
    .bad-pill { background: #ffe1e1; color: #8b1e1e; border-color: #e9a8a8; }
    .neutral-pill { background: #e8eef5; color: #415a77; border-color: #c7d3df; }
    .stack-list { display: flex; flex-direction: column-reverse; gap: 8px; }
    .frame { border: 1px solid #c9d6e2; border-radius: 8px; background: #fff; padding: 10px; font-family: Consolas, monospace; }
    .explain-list { margin: 0; padding-left: 20px; }
    @media (max-width: 960px) { .board { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="js-lab-header">
    <h2>Recursion Debug Board</h2>
    <p>Перевір base case, recursive progress і stack overflow risk до того, як recursion поїде в production</p>
  </div>

  <div class="js-lab-app">
    <div class="board">
      <div class="panel">
        <h3 class="section-title">Scenario Builder</h3>

        <div class="control-row">
          <label for="scenarioSelect">Scenario</label>
          <select id="scenarioSelect">
            <option value="safe-sum">Safe recursive sum</option>
            <option value="missing-base">Missing base case</option>
            <option value="no-progress">No progress toward base case</option>
            <option value="large-depth">Depth too large</option>
          </select>
        </div>

        <div class="control-row">
          <label for="depthInput">Input Depth</label>
          <input id="depthInput" type="number" min="1" max="50000" value="5">
        </div>

        <div class="toolbar">
          <button id="analyzeBtn">Analyze</button>
          <button id="clearBtn" class="alt">Reset</button>
        </div>

        <h3 class="section-title" style="margin-top:16px;">Presets</h3>
        <div class="preset-list">
          <button class="preset-btn" data-preset="safe-sum">Safe Sum</button>
          <button class="preset-btn" data-preset="missing-base">Missing Base</button>
          <button class="preset-btn" data-preset="no-progress">No Progress</button>
          <button class="preset-btn" data-preset="large-depth">Large Depth</button>
        </div>
      </div>

      <div class="panel">
        <h3 class="section-title">Generated Case</h3>
        <div id="codePreview" class="code-preview"></div>

        <div class="box">
          <h4 class="section-title" style="font-size:13px; margin-bottom:8px;">Diagnosis</h4>
          <div id="verdictList" class="pill-list"></div>
        </div>

        <div class="box">
          <h4 class="section-title" style="font-size:13px; margin-bottom:8px;">Call Stack Preview</h4>
          <div id="stackList" class="stack-list"></div>
        </div>

        <div class="box">
          <h4 class="section-title" style="font-size:13px; margin-bottom:8px;">Why</h4>
          <ol id="explainList" class="explain-list"></ol>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { JSLabEngine } from '../../../core/engine.js';
    void JSLabEngine;

    const codePreview = document.getElementById('codePreview');
    const verdictList = document.getElementById('verdictList');
    const stackList = document.getElementById('stackList');
    const explainList = document.getElementById('explainList');
    const depthInput = document.getElementById('depthInput');
    const scenarioSelect = document.getElementById('scenarioSelect');

    function pill(label, cls) {
      return `<span class="pill ${cls}">${label}</span>`;
    }

    function stackFrames(depth, progressing) {
      const frames = [];
      const limit = Math.min(depth, 6);
      for (let i = 0; i < limit; i++) {
        const shown = progressing ? i : 0;
        frames.push(`<div class="frame">walk(level=${shown})</div>`);
      }
      if (depth > limit) {
        frames.push(`<div class="frame">... ${depth - limit} more frames ...</div>`);
      }
      return frames.join('');
    }

    function analyze() {
      const scenario = scenarioSelect.value;
      const depth = Math.max(1, Number(depthInput.value) || 1);
      const verdicts = [];
      const notes = [];
      let code = '';
      let previewDepth = depth;
      let progressing = true;

      if (scenario === 'safe-sum') {
        code = `function sum(list, index = 0) {
  if (index >= list.length) return 0;
  return list[index] + sum(list, index + 1);
}`;
        verdicts.push(pill('base case present', 'good-pill'));
        verdicts.push(pill('progress exists', 'good-pill'));
        notes.push('Base case зупиняє recursion, а `index + 1` гарантує рух до цієї межі.');
        notes.push(depth > 10000 ? 'Логіка правильна, але дуже великий depth усе одно може впертися в runtime stack limit.' : 'Для помірної глибини такий recursive pattern логічно стабільний.');
      } else if (scenario === 'missing-base') {
        code = `function walk(node) {
  return node.children.map(walk);
}`;
        verdicts.push(pill('missing base case', 'bad-pill'));
        verdicts.push(pill('leaf handling unclear', 'warn-pill'));
        notes.push('Функція не показує, що робити на leaf-node або коли `children` порожній/відсутній.');
        notes.push('Reviewer-question тут проста: де саме recursion закінчується? Якщо відповіді нема, це production risk.');
      } else if (scenario === 'no-progress') {
        code = `function loop(n) {
  if (n <= 0) return 0;
  return 1 + loop(n);
}`;
        verdicts.push(pill('base case unreachable', 'bad-pill'));
        verdicts.push(pill('no recursive progress', 'bad-pill'));
        progressing = false;
        notes.push('Умова зупинки формально є, але recursive call не наближається до неї.');
        notes.push('Це одна з найпідступніших recursion-помилок: код виглядає майже правильним, але stack росте безмежно.');
      } else {
        code = `function sum(list, index = 0) {
  if (index >= list.length) return 0;
  return list[index] + sum(list, index + 1);
}

// input length = ${depth}`;
        verdicts.push(pill('logic correct', 'neutral-pill'));
        verdicts.push(pill('stack overflow risk', 'warn-pill'));
        previewDepth = depth;
        notes.push('Алгоритм може бути логічно правильним і все одно небезпечним через runtime stack depth.');
        notes.push('У JavaScript не можна проєктувати production recursion на припущенні, що TCO врятує великий input.');
      }

      if (scenario === 'safe-sum' && depth > 10000) {
        verdicts.push(pill('depth too large', 'warn-pill'));
      }
      if (scenario === 'large-depth' && depth > 20000) {
        verdicts.push(pill('prefer loop / explicit stack', 'bad-pill'));
      }

      codePreview.textContent = code;
      verdictList.innerHTML = verdicts.join('');
      stackList.innerHTML = stackFrames(previewDepth, progressing);
      explainList.innerHTML = notes.map(item => `<li>${item}</li>`).join('');
    }

    function preset(name) {
      const presets = {
        'safe-sum': ['safe-sum', 5],
        'missing-base': ['missing-base', 5],
        'no-progress': ['no-progress', 5],
        'large-depth': ['large-depth', 25000]
      };
      const [scenario, depth] = presets[name];
      scenarioSelect.value = scenario;
      depthInput.value = depth;
      analyze();
    }

    document.getElementById('analyzeBtn').addEventListener('click', analyze);
    document.getElementById('clearBtn').addEventListener('click', () => preset('safe-sum'));
    document.querySelectorAll('.preset-btn').forEach(btn => btn.addEventListener('click', () => preset(btn.dataset.preset)));
    preset('safe-sum');
  </script>
</body>
</html>
