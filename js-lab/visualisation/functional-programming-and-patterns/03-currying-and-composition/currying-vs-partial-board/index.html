<!DOCTYPE html>
<html lang="uk">
<head><meta charset="UTF-8"><title>Currying vs Partial Application Board</title><link rel="stylesheet" href="../../../core/theme.css"><style>.panel-box{width:100%;border:1px solid #d7dfe8;border-radius:8px;background:#f9fbfc;padding:12px;box-sizing:border-box}.panel-title{font-size:13px;font-weight:bold;text-transform:uppercase;color:#2c3e50;margin-bottom:8px}.mono{font-family:Consolas,monospace;white-space:pre-wrap}</style></head>
<body>
<div class="js-lab-header"><h2>Currying vs Partial Application Board</h2><p>Розведи два схожі, але не тотожні механізми</p></div>
<div class="js-lab-controls"><button id="btnPrev" class="js-lab-btn" disabled>◄ Назад</button><div id="stepInfo" class="js-lab-step-info">Крок 1 / 1</div><button id="btnNext" class="js-lab-btn">Далі ►</button></div>
<div class="js-lab-app"><div class="js-lab-top-row"><div class="js-lab-code"><div class="js-lab-line" id="line1"><span class="js-lab-line-num">1</span><span class="kw">const</span> add <span class="op">=</span> a <span class="op">=&gt;</span> b <span class="op">=&gt;</span> a <span class="op">+</span> b;</div><div class="js-lab-line" id="line2"><span class="js-lab-line-num">2</span><span class="kw">const</span> add5 <span class="op">=</span> add(<span class="val-num">5</span>);</div><div class="js-lab-line" id="line3"><span class="js-lab-line-num">3</span><span class="kw">const</span> multiply <span class="op">=</span> (a, b) <span class="op">=&gt;</span> a <span class="op">*</span> b;</div><div class="js-lab-line" id="line4"><span class="js-lab-line-num">4</span><span class="kw">const</span> double <span class="op">=</span> value <span class="op">=&gt;</span> multiply(<span class="val-num">2</span>, value);</div></div><div class="js-lab-stack"><div class="js-lab-stack-title">Function Shape</div><div class="js-lab-stack-container" style="width:100%;max-width:520px;gap:12px;flex-direction:column;"><div class="panel-box"><div class="panel-title">Current Model</div><div id="shapeBox" class="mono"></div></div></div></div></div><div class="js-lab-analysis" id="analysis-log"><h3 id="analysis-title">Title</h3><div id="analysis-body" class="log-wrapper fade-in"><div class="js-lab-log-item"><span class="js-lab-log-label">What:</span><span id="log-what"></span></div><div class="js-lab-log-item"><span class="js-lab-log-label">Why:</span><span id="log-why"></span></div><div class="js-lab-log-item"><span class="js-lab-log-label">Insight:</span><span id="log-insight" style="color: var(--log-accent); font-weight: bold;"></span></div></div></div></div>
<script type="module">import { JSLabEngine } from '../../../core/engine.js'; const show = (text) => document.getElementById('shapeBox').innerHTML = text; const config = { steps: [
{ codeLine:'line1', narration:{ title:'Curried Function', what:'Функція вже побудована як unary chain.', why:'Кожен наступний аргумент повертається через нову function layer.', insight:'Currying змінює форму функції, а не просто фіксує значення.'}, action:()=>show('add: a => b => a + b') },
{ codeLine:'line2', narration:{ title:'Configured Curried Function', what:'Перший аргумент зафіксовано, повернута нова unary function.', why:'add(5) ще не обчислює суму; він створює specialized function.', insight:'Curried configurator зручний для reusable predicates і formatters.'}, action:()=>show('add5: b => 5 + b') },
{ codeLine:'line3', narration:{ title:'Regular Multi-Arg Function', what:'multiply приймає два аргументи в одному call.', why:'Це ще не currying; це стандартна arity-2 function.', insight:'Не кожен configurable helper є curried by default.'}, action:()=>show('multiply: (a, b) => a * b') },
{ codeLine:'line4', narration:{ title:'Partial Application Pattern', what:'double фіксує один аргумент вручну, не змінюючи оригінальну форму multiply.', why:'Тут ідея схожа, але механізм інший: це wrapper, а не curried chain.', insight:'Partial application і currying часто поруч, але це не одна й та сама техніка.'}, action:()=>show('double: value => multiply(2, value)') }
]}; new JSLabEngine(config).init();</script>
</body></html>
