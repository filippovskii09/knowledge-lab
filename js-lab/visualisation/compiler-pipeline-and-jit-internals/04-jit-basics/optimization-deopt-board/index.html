<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Optimization Deopt Board</title>
  <link rel="stylesheet" href="../../../core/theme.css">
  <style>.board{display:grid;grid-template-columns:340px 1fr;gap:20px;flex:1;min-height:0}.panel{background:#fff;border:2px solid var(--color-border);border-radius:8px;padding:16px;overflow:auto}.section-title{margin:0 0 12px 0;color:var(--color-stack);font-size:15px;font-weight:700;text-transform:uppercase}.control-row{margin-bottom:12px}label{display:block;margin-bottom:6px;font-size:13px;font-weight:700;color:#486581}select,button{width:100%;padding:9px 10px;border-radius:6px;border:1px solid #c8d3dd;background:#f8fafc;font-size:14px}.toolbar{display:flex;gap:10px}.toolbar button{border:none;background:var(--color-stack);color:#fff;font-weight:700;cursor:pointer}.toolbar .alt{background:#6c7a89}.code-preview{background:var(--code-bg);color:var(--code-text);border-radius:8px;padding:14px;font-family:Consolas, monospace;white-space:pre-wrap}.pill-list{display:flex;flex-wrap:wrap;gap:8px}.pill{display:inline-block;padding:6px 10px;border-radius:999px;font-family:Consolas, monospace;font-size:13px;font-weight:700}.good{background:#d6f5e8;color:#146c43}.warn{background:#fff3cd;color:#8a6d1f}.bad{background:#ffe1e1;color:#8b1e1e}.explain-list{margin:0;padding-left:20px}@media (max-width:960px){.board{grid-template-columns:1fr}}</style>
</head>
<body>
<div class="js-lab-header"><h2>Optimization Deopt Board</h2><p>Подивись, як optimized path тримається на assumptions і чому є шлях назад</p></div>
<div class="js-lab-app"><div class="board"><div class="panel"><h3 class="section-title">Assumption</h3><div class="control-row"><label for="modeSelect">Runtime Change</label><select id="modeSelect"><option value="holds">Assumptions still hold</option><option value="breaks">Input shape changes</option><option value="chaotic">Highly unstable runtime</option></select></div><div class="toolbar"><button id="analyzeBtn">Analyze</button><button id="clearBtn" class="alt">Reset</button></div></div><div class="panel"><h3 class="section-title">Outcome</h3><div id="trace" class="code-preview"></div><div id="verdict" class="pill-list"></div><ol id="explain" class="explain-list"></ol></div></div></div>
<script type="module">
import { JSLabEngine } from '../../../core/engine.js'; void JSLabEngine;
const pill=(label, cls)=>`<span class="pill ${cls}">${label}</span>`;
function analyze(){
  const v=document.getElementById('modeSelect').value;
  const trace=document.getElementById('trace');
  const verdict=document.getElementById('verdict');
  const explain=document.getElementById('explain');
  let text=''; let tags=[]; let notes=[];
  if(v==='holds'){
    text='optimized path remains valid
execution continues on specialized code';
    tags=[pill('optimized path stable','good')];
    notes=['Поки runtime відповідає припущенням, specialized code має сенс.'];
  }else if(v==='breaks'){
    text='optimized path assumption broken
deopt -> fallback to safer execution';
    tags=[pill('deopt triggered','warn')];
    notes=['Злам припущення не означає поломку рушія; це означає адаптацію.'];
  }else{
    text='inputs keep changing
optimization becomes fragile
general path may dominate';
    tags=[pill('optimization unstable','bad')];
    notes=['Хаотичний runtime часто не дає утримати specialization довго.'];
  }
  notes.push('Головне питання не “optimized or not”, а “які припущення зараз правдиві?”.');
  trace.textContent=text; verdict.innerHTML=tags.join(''); explain.innerHTML=notes.map(x=>`<li>${x}</li>`).join('');
}
document.getElementById('analyzeBtn').addEventListener('click', analyze);
document.getElementById('clearBtn').addEventListener('click', ()=>{document.getElementById('modeSelect').value='holds'; analyze();});
analyze();
</script>
</body>
</html>
