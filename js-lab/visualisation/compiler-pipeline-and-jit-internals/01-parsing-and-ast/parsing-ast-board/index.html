<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Parsing AST Board</title>
  <link rel="stylesheet" href="../../../core/theme.css">
  <style>
    .board{display:grid;grid-template-columns:340px 1fr;gap:20px;flex:1;min-height:0}.panel{background:#fff;border:2px solid var(--color-border);border-radius:8px;padding:16px;overflow:auto}.section-title{margin:0 0 12px 0;color:var(--color-stack);font-size:15px;font-weight:700;text-transform:uppercase}.control-row{margin-bottom:12px}label{display:block;margin-bottom:6px;font-size:13px;font-weight:700;color:#486581}select,button{width:100%;padding:9px 10px;border-radius:6px;border:1px solid #c8d3dd;background:#f8fafc;font-size:14px}.toolbar{display:flex;gap:10px}.toolbar button{border:none;background:var(--color-stack);color:#fff;font-weight:700;cursor:pointer}.toolbar .alt{background:#6c7a89}.code-preview{background:var(--code-bg);color:var(--code-text);border-radius:8px;padding:14px;font-family:Consolas, monospace;white-space:pre-wrap}.pill-list{display:flex;flex-wrap:wrap;gap:8px}.pill{display:inline-block;padding:6px 10px;border-radius:999px;font-family:Consolas, monospace;font-size:13px;font-weight:700}.good{background:#d6f5e8;color:#146c43}.bad{background:#ffe1e1;color:#8b1e1e}.neutral{background:#e8eef5;color:#415a77}.explain-list{margin:0;padding-left:20px}@media (max-width:960px){.board{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="js-lab-header"><h2>Parsing AST Board</h2><p>Подивись, де pipeline ламається: на syntax-stage чи пізніше</p></div>
<div class="js-lab-app"><div class="board"><div class="panel"><h3 class="section-title">Scenario</h3><div class="control-row"><label for="scenarioSelect">Code Shape</label><select id="scenarioSelect"><option value="valid">Valid declaration</option><option value="syntax">Broken syntax</option><option value="runtime">Valid syntax, runtime failure</option></select></div><div class="toolbar"><button id="analyzeBtn">Analyze</button><button id="clearBtn" class="alt">Reset</button></div></div><div class="panel"><h3 class="section-title">Pipeline</h3><div id="codePreview" class="code-preview"></div><div id="verdict" class="pill-list"></div><ol id="explain" class="explain-list"></ol></div></div></div>
<script type="module">
import { JSLabEngine } from '../../../core/engine.js'; void JSLabEngine;
const codePreview = document.getElementById('codePreview');
const verdict = document.getElementById('verdict');
const explain = document.getElementById('explain');
const pill=(label, cls)=>`<span class="pill ${cls}">${label}</span>`;
function analyze(){
  const v=document.getElementById('scenarioSelect').value;
  let code=''; let pills=[]; let notes=[];
  if(v==='valid'){
    code=`source -> tokens -> AST -> next phases
const answer = 40 + 2;`;
    pills=[pill('AST built','good'), pill('syntax valid','good')];
    notes=['Parser може побудувати валідне дерево.','Код може перейти далі в execution pipeline.'];
  }else if(v==='syntax'){
    code=`source -> tokens -> parser error
const answer = ;`;
    pills=[pill('syntax error','bad')];
    notes=['Проблема виникає до нормального runtime execution.','Немає валідного AST для наступних фаз.'];
  }else{
    code=`source -> tokens -> AST -> runtime
foo(); // foo is not defined`;
    pills=[pill('syntax valid','neutral'), pill('runtime error later','bad')];
    notes=['Код проходить parsing stage.','Проблема з’являється вже під час execution.'];
  }
  notes.push('Спочатку визнач стадію pipeline, а вже потім шукай технічну причину.');
  codePreview.textContent = code;
  verdict.innerHTML = pills.join('');
  explain.innerHTML = notes.map(x=>`<li>${x}</li>`).join('');
}
document.getElementById('analyzeBtn').addEventListener('click', analyze);
document.getElementById('clearBtn').addEventListener('click', ()=>{document.getElementById('scenarioSelect').value='valid'; analyze();});
analyze();
</script>
</body>
</html>
