<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>V8 Pipeline Board</title>
  <link rel="stylesheet" href="../../../core/theme.css">
  <style>.board{display:grid;grid-template-columns:340px 1fr;gap:20px;flex:1;min-height:0}.panel{background:#fff;border:2px solid var(--color-border);border-radius:8px;padding:16px;overflow:auto}.section-title{margin:0 0 12px 0;color:var(--color-stack);font-size:15px;font-weight:700;text-transform:uppercase}.control-row{margin-bottom:12px}label{display:block;margin-bottom:6px;font-size:13px;font-weight:700;color:#486581}select,button{width:100%;padding:9px 10px;border-radius:6px;border:1px solid #c8d3dd;background:#f8fafc;font-size:14px}.toolbar{display:flex;gap:10px}.toolbar button{border:none;background:var(--color-stack);color:#fff;font-weight:700;cursor:pointer}.toolbar .alt{background:#6c7a89}.code-preview{background:var(--code-bg);color:var(--code-text);border-radius:8px;padding:14px;font-family:Consolas, monospace;white-space:pre-wrap}.pill-list{display:flex;flex-wrap:wrap;gap:8px}.pill{display:inline-block;padding:6px 10px;border-radius:999px;background:#e8eef5;color:#415a77;font-family:Consolas, monospace;font-size:13px;font-weight:700}.explain-list{margin:0;padding-left:20px}@media (max-width:960px){.board{grid-template-columns:1fr}}</style>
</head>
<body>
<div class="js-lab-header"><h2>V8 Pipeline Board</h2><p>Подивись, як шлях іде від interpreter до optimizer через feedback</p></div>
<div class="js-lab-app"><div class="board"><div class="panel"><h3 class="section-title">Code Path</h3><div class="control-row"><label for="pathSelect">Runtime Pattern</label><select id="pathSelect"><option value="cold">Cold function</option><option value="hot-stable">Hot stable function</option><option value="hot-unstable">Hot unstable function</option></select></div><div class="toolbar"><button id="analyzeBtn">Analyze</button><button id="clearBtn" class="alt">Reset</button></div></div><div class="panel"><h3 class="section-title">Pipeline</h3><div id="codePreview" class="code-preview"></div><div id="pills" class="pill-list"></div><ol id="explain" class="explain-list"></ol></div></div></div>
<script type="module">
import { JSLabEngine } from '../../../core/engine.js'; void JSLabEngine;
function analyze(){
  const v=document.getElementById('pathSelect').value;
  const code=document.getElementById('codePreview');
  const pills=document.getElementById('pills');
  const explain=document.getElementById('explain');
  let text=''; let tags=[]; let notes=[];
  if(v==='cold'){
    text='parse -> bytecode -> Ignition execution
feedback: minimal
TurboFan: unlikely to matter';
    tags=['cold','interpreter path'];
    notes=['Не кожен code path виправдовує optimization cost.'];
  }else if(v==='hot-stable'){
    text='parse -> bytecode -> Ignition -> feedback -> TurboFan -> optimized code';
    tags=['hot','stable','optimization candidate'];
    notes=['Стабільний frequent path дає optimizer-у сильніші припущення.'];
  }else{
    text='parse -> bytecode -> Ignition -> feedback -> tentative optimization -> unstable inputs -> deopt risk';
    tags=['hot','unstable','deopt risk'];
    notes=['Частота без стабільності не гарантує довготривалого optimized path.'];
  }
  notes.push('Мисли pipeline як adaptive loop, а не як одноразову компіляцію.');
  code.textContent=text; pills.innerHTML=tags.map(x=>`<span class="pill">${x}</span>`).join(''); explain.innerHTML=notes.map(x=>`<li>${x}</li>`).join('');
}
document.getElementById('analyzeBtn').addEventListener('click', analyze);
document.getElementById('clearBtn').addEventListener('click', ()=>{document.getElementById('pathSelect').value='cold'; analyze();});
analyze();
</script>
</body>
</html>
